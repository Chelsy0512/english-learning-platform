{% load static %}
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文冒險世界 - 登入大廳</title>
    <style>
        /* 為了快速展示，我們先把登入頁的樣式寫在這裡 */
        body { 
            font-family: '微軟正黑體', sans-serif; 
            background-color: #2c3e50; /* 帶有神祕感的深色背景 */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-box { 
            background: white; 
            width: 350px; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            text-align: center;
        }
        .login-box h1 { color: #333; margin-top: 0; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        .form-group input, .form-group select { 
            width: 100%; 
            padding: 10px; 
            border-radius: 8px; 
            border: 1px solid #ccc; 
            box-sizing: border-box; 
            font-size: 16px;
        }
        .btn-login { 
            width: 100%; 
            padding: 12px; 
            background-color: #ff9800; 
            color: white; 
            border: none; 
            border-radius: 25px; 
            font-size: 18px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 10px; 
            transition: 0.3s;
        }
        .btn-login:hover { background-color: #e68a00; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="login-box">
        <h1>🏰 冒險者登入</h1>
        <p style="color: #777; margin-bottom: 25px;">請出示你的冒險證照來進入世界</p>
        
        {% if messages %}
            {% for message in messages %}
                <p style="color: #ff4d4d; font-weight: bold; margin-bottom: 15px;">❌ {{ message }}</p>
            {% endfor %}
        {% endif %}
        
        <form action="{% url 'public_lobby' %}" method="POST">
            
            {% csrf_token %} 
            
            <div class="form-group">
                <label>冒險者帳號：</label>
                <input type="text" name="username" placeholder="請輸入帳號" required>
            </div>
            
            <div class="form-group">
                <label>密碼：</label>
                <input type="password" name="password" placeholder="請輸入密碼" required>
            </div>
            
            <button type="submit" class="btn-login">進入世界 🚀</button>
        </form>
    </div>

</body>
</html>
